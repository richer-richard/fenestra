name: Bug report
description: Something renders wrong, panics, or misbehaves
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: >
        Include a PNG if it is visual — `render_element(view, &theme,
        size).save("bug.png")` reproduces most rendering bugs headlessly.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A small view/App or a failing `render_app` script.
      render: rust
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: fenestra version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: OS and GPU
      placeholder: "macOS 15 / M3, Windows 11 / RTX 3060, Ubuntu 24.04 / lavapipe"
    validations:
      required: true
