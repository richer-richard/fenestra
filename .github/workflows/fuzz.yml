# Scheduled fuzzing: each target runs for a bounded window; any crash,
# panic, or leak fails the job. Trigger manually with workflow_dispatch
# after touching parser/layout/input code.
name: Fuzz

on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [theme_spec, layout, text_input]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly for -Z sanitizer
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: fuzz
      - run: cargo install cargo-fuzz --locked
      - name: Fuzz for three minutes
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=180
      - name: Upload crash artifacts if any
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts
