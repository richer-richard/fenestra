name: Pages

# Builds the WebGPU demo (and, when present, the book) and deploys the
# site to GitHub Pages on every push to main.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build demo (wasm32 + WebGPU)
        run: cargo build --release --target wasm32-unknown-unknown -p fenestra --example web_demo
      - name: Install wasm-bindgen-cli (version from Cargo.lock)
        run: |
          set -euo pipefail
          version=$(grep -A1 'name = "wasm-bindgen"$' Cargo.lock | grep version | cut -d'"' -f2)
          echo "wasm-bindgen $version"
          cargo install wasm-bindgen-cli --version "$version" --locked
      - name: Bundle site
        run: |
          set -euo pipefail
          mkdir -p site
          cp web/index.html site/index.html
          wasm-bindgen --target web --no-typescript --out-dir site/demo \
            target/wasm32-unknown-unknown/release/examples/web_demo.wasm
          ls -la site site/demo
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
