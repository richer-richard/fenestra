name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly: surfaces new RUSTSEC advisories even with no pushes.
    - cron: "17 6 * * 1"

# CI only reads the repo; never hand write scopes to third-party actions.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  # Warnings are errors everywhere, including tests. Never suppress; fix.
  RUSTFLAGS: "-D warnings"

# Actions are pinned to full commit SHAs (tags are mutable and can be
# repointed); the trailing comment records the human-readable version.
jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test-macos:
    # macOS runners have a Metal GPU; goldens are generated on macOS, so this
    # job is the reference for image comparisons.
    name: test (macOS / Metal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace
      - name: Perf regression gates (generous ceilings, catch 10x not noise)
        run: cargo test -p fenestra-core --test perf_gate --release -- --ignored

  test-linux:
    # Headless vello needs a compute-capable adapter: Mesa lavapipe
    # (software Vulkan) provides one on GitHub's CPU-only runners.
    name: test (Linux / lavapipe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install Mesa lavapipe and font system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools libvulkan1 \
            libfontconfig1-dev pkg-config
      - name: Run tests
        env:
          WGPU_BACKEND: vulkan
          # Goldens are Metal-rendered; lavapipe AA differs slightly.
          # Software-rasterizer pixel budget. 0.6% sufficed until the
          # 0.6 rich-text golden (synthesized-italic thin diagonals AA
          # differently on lavapipe: 0.769%); 1% keeps honest headroom.
          # The macOS reference platform stays at the default 0.2%.
          FENESTRA_SNAPSHOT_BUDGET: "0.010"
        run: cargo test --workspace

  test-windows:
    # GPU-less Windows runners only have DX12 WARP, whose software
    # rasterizer crashes nondeterministically (STATUS_ACCESS_VIOLATION)
    # under vello's compute workloads. Windows therefore verifies the full
    # compile (every target) plus the GPU-free core suites; rendering is
    # covered by Metal (reference) and lavapipe. Real-GPU Windows machines
    # run the full suite fine.
    name: build + core tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --workspace --all-targets
      - run: cargo test -p fenestra-core

  audit:
    # Vulnerabilities in the dependency tree fail the job; unmaintained-crate
    # warnings print but stay advisory so third-party churn cannot redden CI.
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  deny:
    # Licenses (allowlist), bans, advisories, registry pinning.
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install cargo-deny --locked
      - run: cargo deny check

  msrv:
    # The workspace builds on exactly the declared rust-version.
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install font system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev pkg-config
      - run: cargo build --workspace --all-targets

  coverage:
    # Line coverage floor on fenestra-core (set from the measured
    # baseline; raise as it grows, never lower without a recorded
    # decision). Full HTML report uploaded as an artifact.
    name: coverage (core floor)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install cargo-llvm-cov --locked
      - name: Enforce the core line-coverage floor
        # Baseline measured 2026-06-12: 47.28% lines from core's own
        # suite (kit/shell suites exercise core further but don't count
        # here). Floor sits just below; raise it as coverage grows.
        run: cargo llvm-cov -p fenestra-core --fail-under-lines 45 --summary-only
