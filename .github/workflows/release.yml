name: Release

# CD: pushing a v* tag runs the full gates, publishes any crate versions
# not yet on crates.io (dependency order), and creates the GitHub release.
# Both steps are idempotent, so re-running a failed release is safe.
# Requires the CARGO_REGISTRY_TOKEN repository secret.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  RUSTFLAGS: "-D warnings"

jobs:
  gates:
    # macOS is the golden-reference platform; the gates must pass on the
    # tagged commit even if CI already ran elsewhere.
    name: gates (macOS / Metal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  publish:
    name: publish to crates.io
    needs: gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install font system deps (publish verification builds on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev pkg-config
      - name: Publish crates in dependency order (skip published versions)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # Is this exact version already on crates.io? (same endpoint used to
          # decide whether to skip, and to wait for index propagation below.)
          is_published() {
            curl -sf -A "fenestra-release-ci" \
              "https://crates.io/api/v1/crates/$1/$2" >/dev/null
          }
          # Order matters: kit dev-depends on shell (golden tests), so shell
          # publishes before kit; then describe (core+kit), cli (describe+shell),
          # and mcp (cli) follow that chain.
          for crate in fenestra-core fenestra-shell fenestra-kit fenestra-describe fenestra-render fenestra-mcp fenestra fenestra-charts fenestra-markdown fenestra-looks; do
            version=$(cargo pkgid -p "$crate" | sed 's/.*[@#]//')
            if is_published "$crate" "$version"; then
              echo "$crate $version already published; skipping"
              continue
            fi
            cargo publish -p "$crate" --locked
            # Wait for the new version to land in the index before publishing a
            # dependent crate. cargo's own post-publish wait can time out under
            # registry backlog, which then fails the next crate's resolution
            # (e.g. the facade not finding the just-published kit). Re-running is
            # idempotent, but waiting here makes a single run reliable.
            echo "waiting for $crate $version to appear on crates.io…"
            for _ in $(seq 1 60); do
              if is_published "$crate" "$version"; then
                echo "  $crate $version is available"
                break
              fi
              sleep 10
            done
          done

  github-release:
    name: GitHub release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Provenance attestations: signed statements binding the .crate
      # files to this repo, workflow, and commit (verify with
      # `gh attestation verify <file> --repo <owner/repo>`).
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable
      - name: Package crates for attestation
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev pkg-config
          for crate in fenestra-core fenestra-shell fenestra-kit fenestra-describe fenestra-render fenestra-mcp fenestra fenestra-charts fenestra-markdown fenestra-looks; do
            cargo package -p "$crate" --no-verify
          done
      - name: Attest build provenance for the packaged crates
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: target/package/*.crate
      - name: Create release if missing and attach the crates
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists; skipping creation"
          else
            gh release create "$tag" --title "fenestra $tag" \
              --generate-notes \
              --notes "See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          gh release upload "$tag" target/package/*.crate --clobber
