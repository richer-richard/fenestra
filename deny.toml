# cargo-deny: advisories, licenses, bans, sources.
# Run: cargo deny check   (CI runs it on every push + weekly)

[advisories]
yanked = "deny"

[licenses]
# The workspace itself is MIT OR Apache-2.0. Everything in the tree
# must resolve to one of these well-understood licenses.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  # Boost Software License (the permissive OSI one, not BUSL).
  "BSL-1.0",
  "Unicode-3.0",
  "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
